<!DOCTYPE html>
<html lang="ja">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1.0">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
</head>
<body>
<br>
<div class="container" style="font-family: sans-serif;">
    <p class="text-center" style="color: black; font-size:48px; font-weight: bold;">サイコロカウンター</p>
    <div class="row">
        <div class="col">
            <div id="webcam-container" class="text-end"></div>
            <div id="label-container" class="text-end"></div>
        </div>
        <div class="col">
          <div class="row">
            <div class="col d-flex align-items-center justify-content-center">
                <p>サイコロの目は <span id="label" class="col" style="font-size: 48px; font-weight: bold;"></span> です！</p>
            </div>
          </div>
          <div class="row">
            <div class="col d-flex align-items-center justify-content-center">
                <p>カウント： <span id="count" class="col" style="font-size: 48px; font-weight: bold;"></span> </p>
            </div>
          </div>
        </div>
    </div>
    <button type="button" onclick="start()">Start</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script type="text/javascript">
		const URL = "https://teachablemachine.withgoogle.com/models/5CU4cu4NK/"

    let model, labelContainer, maxPredictions;
		let webcam = null;
    let previous = -1;
    let count = [];

    let cameraIndex = 0;
    let cameraDevices = [];

		async function start() {
				if (webcam != null) {
	        await webcam.stop();
				}
        const flip = true;
        webcam = new tmImage.Webcam(500, 500, flip);
        await webcam.setup();
        await webcam.play();
        await webcam.stop();

		    init();
		}

    async function init() {

        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        cameraDevices = [];
        const devices = await navigator.mediaDevices.enumerateDevices();
        devices.forEach(device=>{
          if (device.kind == "videoinput") {
	        	//alert(device.kind, device.deviceId);
            cameraDevices.push(device.deviceId);
          }
        });
				//alert(cameraDevices.length);

        const flip = true;
        webcam = new tmImage.Webcam(500, 500, flip);
        await webcam.setup({ deviceId: String(cameraDevices[cameraIndex % cameraDevices.length]) })
        //await webcam.setup();
        await webcam.play();
        window.requestAnimationFrame(loop);

        document.getElementById("webcam-container").appendChild(webcam.canvas);
        labelContainer = document.getElementById("label-container");
        for (let i = 0; i < maxPredictions; i++) {
            labelContainer.appendChild(document.createElement("div"));
        }

        count = Array(maxPredictions).fill(0);
    }

    async function loop() {
        webcam.update(); // update the webcam frame
        await predict();
        window.requestAnimationFrame(loop);
    }

    // run the webcam image through the image model
    async function predict() {
        // predict can take in an image, video or canvas html element
        const prediction = await model.predict(webcam.canvas);

        let maxPrediction = 0.0;
        let maxPredictionIndex = 0;
        for (let i = 0; i < maxPredictions; i++) {
            const classPrediction =
                prediction[i].className + " である確率: " + prediction[i].probability.toFixed(2) * 100 + " %";
            if (maxPrediction < prediction[i].probability) {
                maxPrediction = prediction[i].probability;
                maxPredictionIndex = i;
            }
            labelContainer.childNodes[i].innerHTML = classPrediction;
        }

        const label = document.getElementById("label");
        label.textContent = prediction[maxPredictionIndex].className;
        label.style.color = maxPredictionIndex == 0 ? "black" : "brown";

        if (previous != maxPredictionIndex) {
          previous = maxPredictionIndex;
          starttime = Date.now();
        } else {
        }
        const co = document.getElementById("count");
        co.textContent = count.toString();
        co.style.color = maxPredictionIndex == 0 ? "black" : "brown";
    }

    document.addEventListener("keydown", logKey);
    function logKey(e) {
      count[previous] += 1;
    }

</script>
</body>
</html>
